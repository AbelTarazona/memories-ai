name: memories
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  lottie: ^3.3.1
  dio: ^5.8.0+1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  fpdart: ^1.1.0
  flutter_colorpicker: ^1.1.0
  shadcn_ui: ^0.28.1
  go_router: ^15.1.1
  supabase_flutter: ^2.9.1
