  google_fonts: ^6.2.1
  intl: ^0.20.2
  font_awesome_flutter: ^10.10.0
  speech_to_text: ^7.3.0
  flutter_svg: ^2.2.1
  flutter_dotenv: ^6.0.0
  flutter_sound: ^9.28.0
  cross_file: ^0.3.4+2
  fuzzywuzzy: ^1.2.0
  shared_preferences: ^2.3.2
  audioplayers: ^6.1.0

dev_dependencies:
